name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Check environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PATH=$PATH"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms found"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools found"

      - name: Download Gradle
        run: |
          GRADLE_VERSION=$(grep -oP 'gradle-\K[0-9.]+' gradle/wrapper/gradle-wrapper.properties | head -1)
          echo "Gradle version: $GRADLE_VERSION"
          curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          gradle --version

      - name: Build Debug APK
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.android-home }}
        run: |
          export ANDROID_HOME=$ANDROID_HOME
          gradle assembleDebug --no-daemon 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: List APK files
        run: find app/build -name '*.apk' -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaoke-speaker-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
