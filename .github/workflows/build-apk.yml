name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Gradle wrapper
        run: |
          GRADLE_VERSION=$(grep -oP 'gradle-\K[0-9.]+' gradle/wrapper/gradle-wrapper.properties | head -1)
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-wrapper-${GRADLE_VERSION}-all.zip" -o /tmp/wrapper.zip
          unzip -q /tmp/wrapper.zip -d /tmp
          cp /tmp/gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaoke-speaker-debug
          path: app/build/outputs/apk/debug/*.apk
